# Local development environment — database only.
# Run the backend (dotnet run) and frontend (ng serve) directly on the host.
#
#   docker compose up -d

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-addressbook}
      POSTGRES_USER: ${POSTGRES_USER:-addressbook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-addressbook}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - addressbook-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-addressbook} -d $${POSTGRES_DB:-addressbook}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  addressbook-db-data:
